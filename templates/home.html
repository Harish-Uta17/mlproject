<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Student Exam Performance</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark navbar-gradient">
            <div class="container">
                <a class="navbar-brand" href="#"><i class="fa-solid fa-graduation-cap me-2"></i>Student Performance</a>
            </div>
        </nav>

        <main class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h2 class="card-title mb-3">Student Exam Performance Predictor</h2>
                            <p class="text-muted">Fill the details below to get a predicted score.</p>

                            <form action="{{ url_for('predict_datapoint') }}" method="post">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Gender</label>
                                        <select class="form-select" name="gender" required>
                                            <option selected disabled value="">Choose...</option>
                                            <option value="male">Male</option>
                                            <option value="female">Female</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Race / Ethnicity</label>
                                        <select class="form-select" name="race_ethnicity" required>
                                            <option selected disabled value="">Choose...</option>
                                            <option value="group A">Group A</option>
                                            <option value="group B">Group B</option>
                                            <option value="group C">Group C</option>
                                            <option value="group D">Group D</option>
                                            <option value="group E">Group E</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Parental Level of Education</label>
                                        <select class="form-select" name="parental_level_of_education" required>
                                            <option selected disabled value="">Choose...</option>
                                            <option value="associate's degree">Associate's degree</option>
                                            <option value="bachelor's degree">Bachelor's degree</option>
                                            <option value="high school">High school</option>
                                            <option value="master's degree">Master's degree</option>
                                            <option value="some college">Some college</option>
                                            <option value="some high school">Some high school</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Lunch Type</label>
                                        <select class="form-select" name="lunch" required>
                                            <option selected disabled value="">Choose...</option>
                                            <option value="free/reduced">Free / Reduced</option>
                                            <option value="standard">Standard</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Test Preparation Course</label>
                                        <select class="form-select" name="test_preparation_course" required>
                                            <option selected disabled value="">Choose...</option>
                                            <option value="none">None</option>
                                            <option value="completed">Completed</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Reading Score (0-100)</label>
                                        <input class="form-control" type="number" name="reading_score" min="0" max="100" required>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Writing Score (0-100)</label>
                                        <input class="form-control" type="number" name="writing_score" min="0" max="100" required>
                                    </div>

                                    <div class="col-12 mt-3">
                                        <button class="btn btn-primary btn-lg" type="submit">Predict Score</button>
                                    </div>
                                </div>
                            </form>

                            {% if results is defined %}
                                <div class="mt-4 alert alert-success" role="alert">
                                    <h4 class="alert-heading">Prediction</h4>
                                    <p class="mb-0">Predicted score: <strong>{{ results }}</strong></p>
                                </div>
                            {% endif %}

                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="text-center py-4 text-muted">
            <small>Built with care — ML Project</small>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
